<!DOCTYPE html>
<html>
    <head>
        <title> Blackjack </title>
    </head>
    <body>
        <div id="table">
            <div id="dealer-area">
                <div id="dealer-cards"></div>
            </div>
            <div id="shoe"></div>
            <div id="message-banner"></div>
            <div id="play-again-option">
                <button id="play-again-button">Play Again</button>
            </div>
            <div id="insurance-options">
                <button id="accept-button">Accept</button>
                <button id="decline-button">Decline</button>
            </div>
            <div id="seat-area">
                <div id="hands-container">
                    <div class="hand-group">
                        <div class="cards"></div>
                        <div class="bet"></div>
                    </div>
                </div>
                <label for="bet-input">Your bet: </label>
                <input type="number" id="bet-input" name="bet-input" placeholder="Enter your bet">
                <button id="place-bet">Place Bet</button>
                <div id="bankroll-chips"></div>
            </div>
            <div id="button-panel">
                <div class="button-row">
                    <button id="hit-button">Hit</button>
                    <button id="stand-button">Stand</button>
                </div>
                <div class="button-row">
                    <button id="double-button">Double</button>
                    <button id="split-button">Split</button>
                </div>
            </div>
        </div>
        <script src="/static/script.js"></script>
    </body>
</html>
